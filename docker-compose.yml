services:
  panel:
    build: .
    image: ee-control-panel:latest
    container_name: ee-control-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Lets the container resolve the host as `host.docker.internal` so the
    # SSH bridge to EasyEngine has a stable target on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # SQLite + log persistence
      - ./data:/app/data
      - ./logs:/app/logs
      # SSH key the container uses to run `ee` on the host. Path mode 0600 is
      # required by the OpenSSH client; we set it explicitly via `:ro` mount
      # plus `chmod 600` on the host side (see README §3).
      - ./secrets/ee_key:/app/secrets/ee_key:ro
