services:
  postgres:
    image: postgres:16-alpine
    container_name: ee-panel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       panel_db
      POSTGRES_USER:     panel_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panelpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel_user -d panel_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  panel:
    build: .
    image: ee-control-panel:latest
    container_name: ee-control-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://panel_user:${POSTGRES_PASSWORD:-panelpass123}@postgres:5432/panel_db
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
      - ./secrets/ee_key:/app/secrets/ee_key:ro

volumes:
  postgres_data:
